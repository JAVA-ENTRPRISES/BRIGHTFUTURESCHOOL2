<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Gallery | BRIGHT FUTURE PUBLIC SCHOOL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container">
<section class="page-title-section">            <span class="eyebrow">Visual Journey</span>
            <h1>Life at Bright Future School</h1>
        </section>

        <div class="gallery-filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="campus">Campus</button>
            <button class="filter-btn" data-filter="events">Events</button>
            <button class="filter-btn" data-filter="sports">Sports</button>
        </div>

        <div class="gallery-grid">
            <div class="gallery-item campus">
                <img src="./gallery 2/sports day u.webp" alt="Library">
                <div class="overlay"><span></span></div>
            </div>
            <div class="gallery-item events">
                <img src="./gallery 2/celebrations 2.avif" alt="Graduation">
                <div class="overlay"><span></span></div>
            </div>
            <div class="gallery-item sports">
                <img src="./gallery 2/computer lab u.webp" alt="Track">
                <div class="overlay"><span></span></div>
            </div>
            <div class="gallery-item campus">
                <img src="./gallery 2/library u.jpg" alt="Lab">
                <div class="overlay"><span></span></div>
            </div>
             </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="script.js"></script>
</body>
</html>
